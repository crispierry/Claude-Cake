name: Netlify Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: netlify-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify site
        run: npm run verify

      - name: Deploy to Netlify production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx netlify-cli@24.3.0 deploy
          --prod
          --dir=.
          --message "GitHub Actions deploy for ${GITHUB_SHA}"
