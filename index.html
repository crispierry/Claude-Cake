<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Interactive 3D celebration cake experience with mobile-friendly controls and browser fallback support.">
<meta name="theme-color" content="#00274c">
<title>Celebration Cake</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="experience-host"></div>

<div id="app-shell">
  <div id="title" hidden></div>
  <button id="light-btn" class="app-control app-control--primary" type="button">Light the candle</button>
  <button id="school-prompt-btn" class="app-control app-control--primary" type="button" hidden>Choose a school!</button>
  <button id="reset-btn" class="app-control app-control--secondary" type="button">Reset</button>
  <div id="white-flash"></div>

  <button id="audio-toggle" type="button"></button>

  <div id="congrats-overlay">
    <div id="congrats-content">
      <img src="logos/placeholder.png" id="congrats-logo-left" class="congrats-logo" alt="">
      <div id="congrats-text-block">
        <span id="congrats-text"></span><br>
        <span id="tati-text"></span><br>
        <span id="goblue-text"></span>
      </div>
      <img src="logos/placeholder.png" id="congrats-logo-right" class="congrats-logo" alt="">
    </div>
  </div>

  <section id="browser-fallback" class="fallback-panel" hidden>
    <h1 id="fallback-title">This browser cannot start the 3D celebration right now</h1>
    <p id="fallback-message">Try the latest Safari, Chrome, Firefox, or Edge on a device with WebGL enabled.</p>
    <button id="fallback-retry" class="app-control app-control--primary" type="button">Try Again</button>
  </section>

  <noscript>
    <section class="fallback-panel fallback-panel--static">
      <h1>JavaScript is required for the 3D celebration</h1>
      <p>Enable JavaScript and reload the page, or open the site in a modern mobile or desktop browser.</p>
    </section>
  </noscript>
</div>

<script type="module" src="app/bootstrap.js"></script>
<script nomodule>
  (function () {
    var fallback = document.getElementById('browser-fallback');
    var message = document.getElementById('fallback-message');
    var retry = document.getElementById('fallback-retry');
    if (message) {
      message.textContent = 'This experience needs modern JavaScript module support. Please update your browser and try again.';
    }
    if (fallback) {
      fallback.hidden = false;
    }
    if (retry) {
      retry.addEventListener('click', function () {
        window.location.reload();
      });
    }
  })();
</script>
</body>
</html>
